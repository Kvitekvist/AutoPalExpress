name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Built before pytest runs so tests/test_frontend_serving.py exercises
      # the real packaged-frontend-serving routes instead of skipping them
      # (app/main.py only registers those routes when web/dist exists).
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

  packaging-smoke:
    # Windows-only: the packaged app targets Windows exclusively (PyInstaller
    # onefile .exe + Inno Setup installer), same as this project's own
    # build_installer.ps1.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packaging dependencies
        run: pip install -r requirements-build.txt

      - name: Verify packaging/runtime version sources agree
        run: python scripts/check_app_version.py

      - name: Build AutoPalExpress.exe with PyInstaller
        run: python -m PyInstaller AutoPalExpress.spec --noconfirm

      - name: Smoke test the packaged executable actually serves /api/health
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\AutoPalExpress.exe" -PassThru
          try {
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/health" -UseBasicParsing -TimeoutSec 2
                if ($resp.StatusCode -eq 200) { $ok = $true; break }
              } catch {}
            }
            if (-not $ok) {
              throw "Packaged AutoPalExpress.exe never responded on /api/health within 30s"
            }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer (compile-only - does not run the installer)
        shell: pwsh
        run: |
          $iscc = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup" }
          & $iscc installer.iss
