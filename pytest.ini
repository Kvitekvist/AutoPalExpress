[pytest]
testpaths = tests
asyncio_mode = auto
# Without this, `pytest` invoked as a bare console script (as opposed to
# `python -m pytest`, which prepends the cwd to sys.path automatically)
# never adds the repo root to sys.path - tests/ has no __init__.py, so
# pytest's own rootdir insertion only adds tests/ itself, and
# conftest.py's `from app.services import ...` fails with
# ModuleNotFoundError. CI's "pytest -v" step hit exactly this.
pythonpath = .
